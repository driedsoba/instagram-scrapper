services:
  mongodb:
    image: mongo:7
    container_name: instagram-scrapper-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: instagram-scrapper-azurite
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5

  functions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instagram-scrapper-functions
    ports:
      - "7071:80"
    environment:
      FUNCTIONS_WORKER_RUNTIME: python
      AzureWebJobsFeatureFlags: EnableWorkerIndexing
      WEBSITE_HOSTNAME: "localhost:80"
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1"
      MONGODB_CONNECTION_STRING: "mongodb://mongodb:27017"
      SOCIAVAULT_API_KEY: ${SOCIAVAULT_API_KEY:?Set SOCIAVAULT_API_KEY in .env or your shell}
    volumes:
      - ./blobs:/home/site/wwwroot/blobs
    depends_on:
      mongodb:
        condition: service_healthy
      azurite:
        condition: service_healthy

volumes:
  mongodb_data:
  azurite_data:
